<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STL Transfer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0E1A;
    --card: #111827;
    --card2: #1A2332;
    --border: #1E2D42;
    --accent: #00D4AA;
    --accent-dim: rgba(0, 212, 170, 0.12);
    --accent-glow: rgba(0, 212, 170, 0.4);
    --text: #E8EDF3;
    --muted: #5A6A82;
    --error: #FF4C4C;
    --warn: #F59E0B;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ── Layout ── */
  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    gap: 0;
  }

  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }

  .logo-mark {
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .logo-mark::before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    opacity: 0.8;
  }

  .logo-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text);
  }
  .logo-text span { color: var(--accent); }

  /* ── Bridge Canvas ── */
  .bridge-wrap {
    width: 100%;
    max-width: 900px;
    position: relative;
    height: 48px;
    margin-bottom: -1px;
    pointer-events: none;
  }
  #bridgeCanvas {
    width: 100%; height: 100%;
  }

  /* ── Main Grid ── */
  .grid {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    align-items: start;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 28px;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .panel-left { border-radius: 12px 0 0 12px; border-right: none; }
  .panel-right { border-radius: 0 12px 12px 0; border-left: none; }

  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-label::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .panel-label.active::before { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  /* ── ID Box ── */
  .id-box {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .id-box-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .id-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .id-value.pending { color: var(--muted); font-size: 13px; animation: pulse 1.4s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .copy-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    padding: 3px 8px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

  /* ── Input ── */
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .input-row { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.06em;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input[type="text"]::placeholder { color: var(--muted); font-weight: 400; font-size: 13px; letter-spacing: 0.02em; }
  input[type="text"]:focus { border-color: var(--accent); }

  /* ── Buttons ── */
  .btn {
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #0A0E1A;
  }
  .btn-primary:hover { background: #00eebf; box-shadow: 0 0 16px var(--accent-glow); }
  .btn-primary:disabled { background: var(--muted); color: var(--bg); cursor: not-allowed; box-shadow: none; }
  .btn-ghost {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-full { width: 100%; }

  /* ── Drop Zone ── */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 140px;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .drop-zone input { display: none; }
  .drop-icon {
    font-size: 28px;
    opacity: 0.5;
    line-height: 1;
  }
  .drop-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .drop-text strong { color: var(--text); }
  .drop-text .accent { color: var(--accent); }

  .file-selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    border-style: solid;
  }
  .file-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
    margin-top: 4px;
  }
  .file-size {
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Center Column ── */
  .center-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 0;
    min-height: 380px;
    position: relative;
    width: 2px;
    background: var(--border);
  }
  .status-bubble {
    position: absolute;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--muted);
    white-space: nowrap;
    z-index: 2;
    text-align: center;
    transition: all 0.3s;
  }
  .status-bubble.connected {
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* ── Progress ── */
  .progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .progress-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  .progress-bar {
    height: 4px;
    background: var(--card2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width 0.2s;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .progress-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Received Files ── */
  .received-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .received-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .received-icon { font-size: 18px; flex-shrink: 0; }
  .received-info { flex: 1; min-width: 0; }
  .received-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .received-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .dl-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    padding: 5px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .dl-btn:hover { background: var(--accent); color: var(--bg); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--error); color: var(--error); }
  .toast.success { border-color: var(--accent); color: var(--accent); }

  /* ── Log ── */
  .log-wrap {
    width: 100%;
    max-width: 900px;
    margin-top: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }
  .log-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .log-entries {
    max-height: 100px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .log-entry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 10px;
    line-height: 1.5;
  }
  .log-time { color: #2A3A52; flex-shrink: 0; }
  .log-entry.ok .log-msg { color: var(--accent); }
  .log-entry.err .log-msg { color: var(--error); }
  .log-entry.warn .log-msg { color: var(--warn); }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    .center-col { display: none; }
    .panel-left { border-radius: 12px 12px 0 0; border-right: 1px solid var(--border); border-bottom: none; }
    .panel-right { border-radius: 0 0 12px 12px; border-left: 1px solid var(--border); border-top: none; }
    .bridge-wrap { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-mark"></div>
    <span class="logo-text">STL<span>BEAM</span></span>
  </header>

  <div class="bridge-wrap">
    <canvas id="bridgeCanvas"></canvas>
  </div>

  <div class="grid">

    <!-- GÖNDER -->
    <div class="panel panel-left">
      <div class="panel-label" id="sendLabel">Gönder</div>
      <div class="panel-title">Dosya Gönder</div>

      <div class="id-box">
        <div class="id-box-label">Senin Bağlantı Kodun</div>
        <div class="id-value" id="myIdDisplay">
          <span id="myIdText" class="pending">bağlanıyor...</span>
          <button class="copy-btn" id="copyBtn" onclick="copyMyId()">Kopyala</button>
        </div>
      </div>

      <div class="input-group">
        <label>Alıcının Kodu</label>
        <div class="input-row">
          <input type="text" id="targetId" placeholder="örn. 4829" maxlength="6" oninput="this.value=this.value.toUpperCase()">
        </div>
        <button class="btn btn-primary btn-full" id="connectBtn" onclick="connectToPeer()">Bağlan</button>
      </div>

      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".stl,.STL,*" onchange="fileSelected(this)">
        <div class="drop-icon">△</div>
        <div class="drop-text">
          <strong>STL dosyası seç</strong><br>
          veya buraya sürükle-bırak<br>
          <span class="accent">max 250 MB</span>
        </div>
      </div>

      <div id="sendProgress" class="progress-wrap" style="display:none">
        <div class="progress-header">
          <span class="progress-label">Gönderiliyor</span>
          <span class="progress-pct" id="sendPct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="sendBar"></div></div>
        <div class="progress-sub" id="sendSub">Hazırlanıyor...</div>
      </div>

      <button class="btn btn-primary btn-full" id="sendBtn" onclick="sendFile()" disabled>Gönder</button>
    </div>

    <!-- ORTA -->
    <div class="center-col">
      <div class="status-bubble" id="statusBubble">· · ·</div>
    </div>

    <!-- AL -->
    <div class="panel panel-right">
      <div class="panel-label" id="recvLabel">Al</div>
      <div class="panel-title">Gelen Dosyalar</div>

      <div id="waitingState" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center;">
        <div style="font-size:36px; opacity:0.2;">▽</div>
        <div style="font-size:13px; color:var(--muted); line-height:1.8;">
          Kodunu karşı tarafa ver.<br>
          Gönderen bağlandığında<br>dosyalar burada görünür.
        </div>
      </div>

      <div id="recvProgress" class="progress-wrap" style="display:none">
        <div class="progress-header">
          <span class="progress-label">Alınıyor</span>
          <span class="progress-pct" id="recvPct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="recvBar"></div></div>
        <div class="progress-sub" id="recvSub">Bekleniyor...</div>
        <div style="font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace;" id="recvFileName"></div>
      </div>

      <div class="received-list" id="receivedList"></div>
    </div>

  </div><!-- /grid -->

  <div class="log-wrap">
    <div class="log-header">→ Bağlantı Günlüğü</div>
    <div class="log-entries" id="logEntries"></div>
  </div>

</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────
const CHUNK_SIZE = 64 * 1024; // 64KB chunks
const MAX_SIZE   = 250 * 1024 * 1024; // 250MB

// ── State ───────────────────────────────────────────────
let peer, conn;
let selectedFile = null;
let receiveBuffer = [], receivingMeta = null, receivedBytes = 0;
let transferActive = false;
let particles = [];
let transferring = false;

// ── PeerJS Init ─────────────────────────────────────────
function generateId() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

function initPeer() {
  const myId = generateId();
  peer = new Peer(myId, {
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:global.relay.metered.ca:80' },
        { urls: 'turn:global.relay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:global.relay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
      ]
    }
  });

  peer.on('open', id => {
    document.getElementById('myIdText').textContent = id;
    document.getElementById('myIdText').classList.remove('pending');
    log('Hazır. Kodun: ' + id, 'ok');
  });

  peer.on('connection', c => {
    conn = c;
    log('Bağlantı isteği geldi: ' + c.peer, 'ok');
    setupConn(conn);
  });

  peer.on('error', err => {
    log('Peer hatası: ' + err.type, 'err');
    if (err.type === 'unavailable-id') {
      setTimeout(initPeer, 500);
    }
  });
}

function setupConn(c) {
  c.on('open', () => {
    setStatus('Bağlandı', true);
    log('Bağlantı kuruldu ↔ ' + c.peer, 'ok');
    updateSendBtn();
    document.getElementById('recvLabel').classList.add('active');
    document.getElementById('sendLabel').classList.add('active');
    document.getElementById('waitingState').innerHTML =
      `<div style="font-size:24px;opacity:0.5;">↯</div>
       <div style="font-size:12px;color:var(--accent);font-family:'JetBrains Mono',monospace;">Bağlantı aktif</div>
       <div style="font-size:11px;color:var(--muted);">Gelen dosyalar burada görünecek</div>`;
  });

  c.on('data', handleIncoming);

  c.on('close', () => {
    setStatus('Bağlantı kesildi', false);
    log('Bağlantı kapandı', 'warn');
    conn = null;
    transferActive = false;
    document.getElementById('recvLabel').classList.remove('active');
    document.getElementById('sendLabel').classList.remove('active');
    updateSendBtn();
  });

  c.on('error', err => log('Bağlantı hatası: ' + err, 'err'));
}

function connectToPeer() {
  const targetId = document.getElementById('targetId').value.trim();
  if (!targetId || targetId.length !== 4) { toast('4 haneli kodu gir', 'error'); return; }
  if (!peer) { toast('Peer henüz hazır değil', 'error'); return; }
  log('Bağlanıyor: ' + targetId, '');
  conn = peer.connect(targetId, { reliable: true, serialization: 'binary' });
  setupConn(conn);
}

// ── File Handling ────────────────────────────────────────
function fileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > MAX_SIZE) {
    toast('Dosya 250 MB sınırını aşıyor!', 'error');
    return;
  }
  selectedFile = file;
  const dz = document.getElementById('dropZone');
  dz.classList.add('file-selected');
  dz.innerHTML = `
    <div class="drop-icon" style="opacity:0.9">△</div>
    <div class="file-name">${escHtml(file.name)}</div>
    <div class="file-size">${fmtSize(file.size)}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px;">Değiştirmek için tekrar tıkla</div>
    <input type="file" id="fileInput" accept=".stl,.STL,*" onchange="fileSelected(this)" style="display:none">
  `;
  log('Dosya seçildi: ' + file.name + ' (' + fmtSize(file.size) + ')', 'ok');
  updateSendBtn();
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = !(conn && selectedFile && !transferActive);
}

async function sendFile() {
  if (!conn || !selectedFile || transferActive) return;
  transferActive = true;
  transferring = true;
  updateSendBtn();

  const meta = { type: 'meta', name: selectedFile.name, size: selectedFile.size };
  conn.send(meta);
  log('Meta gönderildi: ' + selectedFile.name, '');

  const reader = new FileReader();
  reader.readAsArrayBuffer(selectedFile);
  reader.onload = async () => {
    const buf = reader.result;
    const total = buf.byteLength;
    let offset = 0;
    const sendProg = document.getElementById('sendProgress');
    sendProg.style.display = 'flex';

    function sendNext() {
      if (offset >= total) {
        conn.send({ type: 'done' });
        log('Gönderim tamamlandı: ' + selectedFile.name, 'ok');
        toast('Dosya gönderildi ✓', 'success');
        transferActive = false;
        transferring = false;
        updateSendBtn();
        document.getElementById('sendPct').textContent = '100%';
        document.getElementById('sendBar').style.width = '100%';
        document.getElementById('sendSub').textContent = 'Tamamlandı';
        return;
      }
      const slice = buf.slice(offset, offset + CHUNK_SIZE);
      conn.send(slice);
      offset += CHUNK_SIZE;

      const pct = Math.min(100, Math.round(offset / total * 100));
      document.getElementById('sendPct').textContent = pct + '%';
      document.getElementById('sendBar').style.width = pct + '%';
      document.getElementById('sendSub').textContent = fmtSize(offset) + ' / ' + fmtSize(total);

      // Throttle to avoid buffer overflow
      if (conn.dataChannel && conn.dataChannel.bufferedAmount > 2 * 1024 * 1024) {
        setTimeout(sendNext, 50);
      } else {
        setTimeout(sendNext, 0);
      }
    }
    sendNext();
  };
}

// ── Receive ──────────────────────────────────────────────
function handleIncoming(data) {
  if (data && data.type === 'meta') {
    receivingMeta = data;
    receiveBuffer = [];
    receivedBytes = 0;
    transferring = true;
    document.getElementById('waitingState').style.display = 'none';
    document.getElementById('recvProgress').style.display = 'flex';
    document.getElementById('recvFileName').textContent = data.name;
    document.getElementById('recvPct').textContent = '0%';
    document.getElementById('recvBar').style.width = '0%';
    document.getElementById('recvSub').textContent = '0 / ' + fmtSize(data.size);
    log('Dosya alınıyor: ' + data.name + ' (' + fmtSize(data.size) + ')', '');
    return;
  }
  if (data && data.type === 'done') {
    finishReceive();
    return;
  }
  if (data instanceof ArrayBuffer && receivingMeta) {
    receiveBuffer.push(data);
    receivedBytes += data.byteLength;
    const pct = Math.min(100, Math.round(receivedBytes / receivingMeta.size * 100));
    document.getElementById('recvPct').textContent = pct + '%';
    document.getElementById('recvBar').style.width = pct + '%';
    document.getElementById('recvSub').textContent = fmtSize(receivedBytes) + ' / ' + fmtSize(receivingMeta.size);
  }
}

let receivedStore = {};
let receivedCounter = 0;

function finishReceive() {
  const blob = new Blob(receiveBuffer);
  const meta = receivingMeta;
  const id = 'f' + (receivedCounter++);
  receivedStore[id] = { blob, name: meta.name };

  log('Alım tamamlandı: ' + meta.name, 'ok');
  toast('Dosya alındı ✓', 'success');
  transferring = false;
  document.getElementById('recvProgress').style.display = 'none';

  const item = document.createElement('div');
  item.className = 'received-item';

  const icon = document.createElement('div');
  icon.className = 'received-icon';
  icon.textContent = '△';

  const info = document.createElement('div');
  info.className = 'received-info';
  const nameEl = document.createElement('div');
  nameEl.className = 'received-name';
  nameEl.textContent = meta.name;
  const metaEl = document.createElement('div');
  metaEl.className = 'received-meta';
  metaEl.textContent = fmtSize(meta.size);
  info.appendChild(nameEl);
  info.appendChild(metaEl);

  const btn = document.createElement('button');
  btn.className = 'dl-btn';
  btn.textContent = 'İndir';
  btn.addEventListener('click', () => dl(id));

  item.appendChild(icon);
  item.appendChild(info);
  item.appendChild(btn);
  document.getElementById('receivedList').appendChild(item);

  receiveBuffer = []; receivingMeta = null; receivedBytes = 0;
}

async function dl(id) {
  const entry = receivedStore[id];
  if (!entry) return;
  const { blob, name } = entry;

  // iOS Safari: blob: URL + <a download> gets stuck in an infinite
  // "downloading" state (known WebKit bug). Native share sheet is
  // reliable there and lets the user save straight to Files.
  if (navigator.canShare) {
    try {
      const file = new File([blob], name, { type: 'application/octet-stream' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
        return;
      }
    } catch (e) {
      if (e.name === 'AbortError') return; // user cancelled the sheet
      // otherwise fall through to classic download below
    }
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 30000);
}

// ── Drag & Drop ──────────────────────────────────────────
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) { const dt = new DataTransfer(); dt.items.add(file); document.getElementById('fileInput').files = dt.files; fileSelected(document.getElementById('fileInput')); }
});

// ── UI Helpers ────────────────────────────────────────────
function setStatus(text, connected) {
  const b = document.getElementById('statusBubble');
  b.textContent = connected ? '↔ ' + text : text;
  b.className = 'status-bubble' + (connected ? ' connected' : '');
}

function copyMyId() {
  const id = document.getElementById('myIdText').textContent;
  if (id === 'bağlanıyor...') return;
  navigator.clipboard.writeText(id).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Kopyalandı!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 1500);
  });
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 3000);
}

function log(msg, level) {
  const el = document.getElementById('logEntries');
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
  const e = document.createElement('div');
  e.className = 'log-entry' + (level ? ' ' + level : '');
  e.innerHTML = `<span class="log-time">${ts}</span><span class="log-msg">${escHtml(msg)}</span>`;
  el.appendChild(e);
  el.scrollTop = el.scrollHeight;
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Bridge Canvas Animation ────────────────────────────────
const canvas = document.getElementById('bridgeCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function spawnParticle() {
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  particles.push({
    x: Math.random() < 0.5 ? 0 : w,
    y: h / 2 + (Math.random() - 0.5) * 6,
    vx: (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 2),
    alpha: 1,
    size: 1.5 + Math.random() * 1.5
  });
}

function drawBridge() {
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  ctx.clearRect(0, 0, w, h);

  // Line
  const isConn = document.getElementById('statusBubble').classList.contains('connected');
  ctx.strokeStyle = isConn ? 'rgba(0,212,170,0.18)' : 'rgba(30,45,66,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
  ctx.stroke();

  if (isConn && transferring) {
    if (Math.random() < 0.4) spawnParticle();
  }

  particles = particles.filter(p => p.alpha > 0.02);
  for (const p of particles) {
    p.x += p.vx;
    p.alpha *= 0.97;
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = '#00D4AA';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(drawBridge);
}
drawBridge();

// ── Boot ────────────────────────────────────────────────
initPeer();
</script>
